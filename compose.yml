name: job-tracker

services:
  kafka:
    image: docker.io/apache/kafka:4.2.0
    container_name: job-tracker-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft mode: Kafka runs without ZooKeeper. This single node plays
      # both the "broker" role (stores messages) and the "controller"
      # role (manages cluster metadata).
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Listeners — where Kafka accepts connections.
      #   INTERNAL  (kafka:29092)   used by other containers on this network
      #   EXTERNAL  (localhost:9092) used by anything on the host
      #   TAILNET   (0.0.0.0:9094)  reachable from the tailnet; advertised
      #                             as the home-server's tailnet hostname
      #                             so the desktop TUI on the Mac can
      #                             produce/consume over Tailscale (ADR 0004)
      #   CONTROLLER (kafka:9093)   internal KRaft chatter
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,TAILNET://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092,TAILNET://${KAFKA_TAILNET_HOSTNAME:-homeserver.tailnet.ts.net}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,TAILNET:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Single-node cluster tuning. Defaults assume 3 brokers.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # KRaft requires a cluster ID. Any 22-char base64 string works.
      CLUSTER_ID: job-tracker-cluster-01

      # The apache/kafka image defaults KAFKA_LOG_DIRS to
      # /tmp/kraft-combined-logs. Override so logs land on the mounted
      # named volume below and survive container recreation.
      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:latest
    container_name: job-tracker-kafka-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: job-tracker
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: job-tracker-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker
      POSTGRES_DB: jobtracker
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtracker -d jobtracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  store:
    build: .
    container_name: job-tracker-store
    command: [store]
    # 9090 is the ADR 0006 admin server (/skip-count, /healthz). Bound
    # to the host's loopback only — "no external exposure" per the ADR.
    # The TUI on the same host reaches it directly; to reach it from
    # the operator's laptop over Tailscale, run `tailscale serve` on
    # the home server to expose 127.0.0.1:9090 to the tailnet.
    ports:
      - "127.0.0.1:9090:9090"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      DATABASE_URL: postgres://jobtracker:jobtracker@postgres:5432/jobtracker?sslmode=disable
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  scheduler:
    build: .
    container_name: job-tracker-scheduler
    command: [scheduler]
    # 9091 — admin server, same shape as store (ADR 0006).
    ports:
      - "127.0.0.1:9091:9091"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      DATABASE_URL: postgres://jobtracker:jobtracker@postgres:5432/jobtracker?sslmode=disable
      REMINDER_SAVED_SECONDS: ${REMINDER_SAVED_SECONDS:-}
      REMINDER_APPLIED_SECONDS: ${REMINDER_APPLIED_SECONDS:-}
      REMINDER_POLL_SECONDS: ${REMINDER_POLL_SECONDS:-}
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notifier:
    build: .
    container_name: job-tracker-notifier
    command: [notifier]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy

  bot:
    build: .
    container_name: job-tracker-bot
    command: [bot]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      DATABASE_URL: postgres://jobtracker:jobtracker@postgres:5432/jobtracker?sslmode=disable
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  cli:
    build: .
    entrypoint: [cli]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    profiles: [tools]
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka-data:
  postgres-data:
