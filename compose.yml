name: job-tracker

services:
  kafka:
    image: docker.io/apache/kafka:4.2.0
    container_name: job-tracker-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode: Kafka runs without ZooKeeper. This single node plays
      # both the "broker" role (stores messages) and the "controller"
      # role (manages cluster metadata).
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Listeners — where Kafka accepts connections.
      #   INTERNAL  (kafka:29092)   used by other containers on this network
      #   EXTERNAL  (localhost:9092) used by anything on the host
      #   CONTROLLER (kafka:9093)   internal KRaft chatter
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Single-node cluster tuning. Defaults assume 3 brokers.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # KRaft requires a cluster ID. Any 22-char base64 string works.
      CLUSTER_ID: job-tracker-cluster-01

    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:latest
    container_name: job-tracker-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: job-tracker
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  postgres:
    image: docker.io/library/postgres:16
    container_name: job-tracker-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker
      POSTGRES_DB: jobtracker
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtracker -d jobtracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kafka-data:
  postgres-data:
